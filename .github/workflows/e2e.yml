name: e2e

# Real-GitHub smoke test for the GlueOps Deployment actions, end to end:
#   1. bump mints a scoped App token, edits values.yaml (comment-preserving), opens a PR
#   2. re-running bump is idempotent (reuses the PR, no duplicate)
#   3. a SECOND app (monorepo) gets its own distinct, app-named PR
#   4. cleanup (on GITHUB_TOKEN, like prod) closes ONLY the superseded same-app+env PR,
#      leaving a different app (other-app/prod) and a different env (test-app/staging) open
# Deterministic and self-cleaning: one job, no async event cascades. Safe to re-run.
#
# By default it tests @main of both actions. To validate an UNMERGED change, dispatch
# with bump_ref / cleanup_ref set to a branch, tag, SHA, or PR ref (refs/pull/<N>/head) —
# the action is checked out at that ref and run locally, so you never merge to test.
on:
  workflow_dispatch:
    inputs:
      bump_ref:
        description: "Ref of github-actions-bump-deployment-tag to test (branch/tag/SHA/refs/pull/N/head)"
        default: main
      cleanup_ref:
        description: "Ref of github-actions-cleanup-deployment-prs to test (branch/tag/SHA/refs/pull/N/head)"
        default: main
  schedule:
    # Hourly. Runs at :17 (not :00) — GitHub delays cron under the top-of-hour load
    # spike, so an off-peak minute fires more reliably. Always tests @main.
    - cron: "17 * * * *"

# Serialize runs — the job mutates shared repo state (branches / PRs).
concurrency:
  group: e2e
  cancel-in-progress: false

permissions:
  contents: write # GITHUB_TOKEN: setup/teardown refs + cleanup branch deletes
  pull-requests: write # GITHUB_TOKEN: open/close PRs + cleanup

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  REPO: ${{ github.repository }}
  CONFIG_REPO: e2e-github-actions-deployment-configurations
  VALUES_PATH: apps/test-app/envs/prod/values.yaml
  SUPER_BRANCH: e2e/super
  STAGING_BRANCH: e2e/ctrl-staging
  HUMAN_BRANCH: e2e/ctrl-human

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for the control-PR helper script)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Check out the actions under test at the requested refs (default: main) and run
      # them locally via `uses: ./_actions/...`. This is how we test an unmerged branch/PR
      # without merging — `uses:` can't take an expression, but a local path can. Note the
      # ref's COMMITTED dist/ is what runs (the actions ship a prebuilt bundle).
      - name: Check out bump action at the ref under test
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: GlueOps/github-actions-bump-deployment-tag
          ref: ${{ inputs.bump_ref || 'main' }}
          path: _actions/bump
      - name: Check out cleanup action at the ref under test
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: GlueOps/github-actions-cleanup-deployment-prs
          ref: ${{ inputs.cleanup_ref || 'main' }}
          path: _actions/cleanup

      - name: "Setup: clear leftover e2e PRs + branches from prior runs"
        run: |
          set -euo pipefail
          echo "Testing bump@${{ inputs.bump_ref || 'main' }}, cleanup@${{ inputs.cleanup_ref || 'main' }}"
          # Close leftover e2e PRs: deploy PRs (marker) AND control PRs (e2e/ branch,
          # incl. the marker-less human control).
          for pr in $(gh api "repos/$REPO/pulls?state=open&per_page=100" --jq '.[].number'); do
            body=$(gh api "repos/$REPO/pulls/$pr" --jq '.body // ""')
            branch=$(gh api "repos/$REPO/pulls/$pr" --jq '.head.ref')
            case "$branch" in e2e/*) is_e2e=1 ;; *) is_e2e=0 ;; esac
            if printf '%s' "$body" | grep -q 'glueops-deploy:' || [ "$is_e2e" = 1 ]; then
              echo "closing leftover e2e PR #$pr (branch $branch)"
              gh api -X PATCH "repos/$REPO/pulls/$pr" -f state=closed >/dev/null 2>&1 || true
              gh api -X DELETE "repos/$REPO/git/refs/heads/$branch" >/dev/null 2>&1 || true
            fi
          done
          for b in "$SUPER_BRANCH" "$STAGING_BRANCH" "$HUMAN_BRANCH"; do
            gh api -X DELETE "repos/$REPO/git/refs/heads/$b" >/dev/null 2>&1 || true
          done

      - name: "Bump: open a deploy PR (mints scoped App token, edits values.yaml)"
        id: bump
        uses: ./_actions/bump
        with:
          ENV: prod
          CREATE_PR: "true"
          DEPLOYMENT_CONFIGS_REPO: ${{ env.CONFIG_REPO }}
          DEPLOYMENT_CONFIGS_APP_NAME: test-app
          app-id: ${{ vars.GLUEOPS_DEPLOYMENT_APP_ID }}
          private-key: ${{ secrets.GLUEOPS_DEPLOYMENT_APP_PRIVATE_KEY }}

      - name: "Assert: bump created a PR with a valid marker + preserved comments"
        run: |
          set -euo pipefail
          got='${{ steps.bump.outputs.action }}'
          test "$got" = "created-pr" || { echo "expected action=created-pr, got '$got'"; exit 1; }
          PR='${{ steps.bump.outputs.pr-number }}'
          TAG='${{ steps.bump.outputs.tag }}'
          test -n "$PR" && test -n "$TAG"
          branch=$(gh api "repos/$REPO/pulls/$PR" --jq '.head.ref')
          {
            echo "BUMP_PR=$PR"
            echo "BUMP_TAG=$TAG"
            echo "BUMP_BRANCH=$branch"
          } >> "$GITHUB_ENV"

          body=$(gh api "repos/$REPO/pulls/$PR" --jq '.body // ""')
          printf '%s' "$body" | grep -q "glueops-deploy:{\"app\":\"test-app\",\"env\":\"prod\",\"tag\":\"$TAG\"}" \
            || { echo "marker missing/mismatched in PR #$PR body"; exit 1; }

          file=$(gh api "repos/$REPO/contents/$VALUES_PATH?ref=$branch" --jq '.content' | base64 -d)
          echo "--- values.yaml on branch $branch ---"; printf '%s\n' "$file"
          printf '%s' "$file" | grep -Eq "tag:[[:space:]]*[\"']?${TAG}[\"']?" \
            || { echo "image.tag was not updated to $TAG"; exit 1; }
          printf '%s' "$file" | grep -q 'e2e-sentinel-comment' \
            || { echo "comment was NOT preserved by the YAML edit"; exit 1; }
          echo "✅ bump: created PR #$PR, tag=$TAG, marker ok, comment preserved"

      - name: "Bump again (should be idempotent — reuse the PR, no duplicate)"
        id: bump2
        uses: ./_actions/bump
        with:
          ENV: prod
          CREATE_PR: "true"
          DEPLOYMENT_CONFIGS_REPO: ${{ env.CONFIG_REPO }}
          DEPLOYMENT_CONFIGS_APP_NAME: test-app
          app-id: ${{ vars.GLUEOPS_DEPLOYMENT_APP_ID }}
          private-key: ${{ secrets.GLUEOPS_DEPLOYMENT_APP_PRIVATE_KEY }}

      - name: "Assert: the re-run reused the same PR (updated-pr, no dupe)"
        run: |
          set -euo pipefail
          got='${{ steps.bump2.outputs.action }}'
          test "$got" = "updated-pr" || { echo "expected action=updated-pr on re-run, got '$got'"; exit 1; }
          test '${{ steps.bump2.outputs.pr-number }}' = "$BUMP_PR" \
            || { echo "re-run opened a DIFFERENT PR than #$BUMP_PR"; exit 1; }
          echo "✅ bump idempotent: reused PR #$BUMP_PR"

      - name: "Bump a SECOND app (monorepo): other-app / prod"
        id: bump_other
        uses: ./_actions/bump
        with:
          ENV: prod
          CREATE_PR: "true"
          DEPLOYMENT_CONFIGS_REPO: ${{ env.CONFIG_REPO }}
          DEPLOYMENT_CONFIGS_APP_NAME: other-app
          app-id: ${{ vars.GLUEOPS_DEPLOYMENT_APP_ID }}
          private-key: ${{ secrets.GLUEOPS_DEPLOYMENT_APP_PRIVATE_KEY }}

      - name: "Assert: second app gets a distinct, APP-NAMED PR (monorepo)"
        run: |
          set -euo pipefail
          got='${{ steps.bump_other.outputs.action }}'
          test "$got" = "created-pr" || { echo "expected created-pr for other-app, got '$got'"; exit 1; }
          OP='${{ steps.bump_other.outputs.pr-number }}'
          test -n "$OP"
          obranch=$(gh api "repos/$REPO/pulls/$OP" --jq '.head.ref')
          { echo "OTHER_PR=$OP"; echo "OTHER_BRANCH=$obranch"; } >> "$GITHUB_ENV"
          otitle=$(gh api "repos/$REPO/pulls/$OP" --jq '.title')
          echo "other-app PR #$OP title: $otitle"
          # Requires the bump appName fix — without it the title uses the source repo
          # name and would NOT contain 'other-app'.
          case "$otitle" in
            *"other-app"*) : ;;
            *) echo "PR title does not name the app 'other-app' — needs the bump appName fix on @main: $otitle"; exit 1 ;;
          esac
          obody=$(gh api "repos/$REPO/pulls/$OP" --jq '.body // ""')
          printf '%s' "$obody" | grep -q 'glueops-deploy:{"app":"other-app","env":"prod"' \
            || { echo "other-app marker missing/mismatched"; exit 1; }
          echo "✅ second app PR #$OP is distinct + titled by app name"

      - name: "Setup isolation controls: superseding + different-env + marker-less human PR"
        run: |
          set -euo pipefail
          super=$(bash .github/e2e/open-deploy-pr.sh "$SUPER_BRANCH" test-app prod e2e-super)
          ctrl=$(bash .github/e2e/open-deploy-pr.sh "$STAGING_BRANCH" test-app staging e2e-staging)

          # A marker-LESS PR standing in for a human / unrelated-bot PR. cleanup must
          # never touch a PR without the glueops-deploy marker — this proves it live.
          base=$(gh api "repos/$REPO/git/ref/heads/main" --jq '.object.sha')
          gh api -X POST "repos/$REPO/git/refs" -f ref="refs/heads/$HUMAN_BRANCH" -f sha="$base" >/dev/null
          hc=$(printf 'e2e human-PR control — intentionally NO deploy marker.\n' | base64 -w0)
          gh api -X PUT "repos/$REPO/contents/e2e/human-note.txt" \
            -f message="docs: e2e human-control note" -f content="$hc" -f branch="$HUMAN_BRANCH" >/dev/null
          human=$(gh api -X POST "repos/$REPO/pulls" \
            -f title="docs: unrelated human PR (e2e control)" -f head="$HUMAN_BRANCH" -f base=main \
            -f body="A normal PR with no glueops-deploy marker. Cleanup must never close this." --jq '.number')

          { echo "SUPER_PR=$super"; echo "STAGING_PR=$ctrl"; echo "HUMAN_PR=$human"; } >> "$GITHUB_ENV"
          test "$super" -gt "$BUMP_PR" || { echo "super PR #$super is not newer than bump PR #$BUMP_PR"; exit 1; }
          echo "✅ super #$super (test-app/prod) + staging #$ctrl (test-app/staging) + human #$human (no marker)"

      - name: "Cleanup: close superseded PRs (runs on GITHUB_TOKEN, like prod)"
        uses: ./_actions/cleanup
        with:
          pr_number: ${{ env.SUPER_PR }}
          gh_token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Assert: cleanup closed ONLY the same app+env older PR (isolation)"
        run: |
          set -euo pipefail
          # superseded (test-app/prod, older) → closed + branch deleted
          test "$(gh api "repos/$REPO/pulls/$BUMP_PR" --jq '.state')" = "closed" \
            || { echo "superseded bump PR #$BUMP_PR should be closed"; exit 1; }
          if gh api "repos/$REPO/git/ref/heads/$BUMP_BRANCH" >/dev/null 2>&1; then
            echo "bump branch '$BUMP_BRANCH' should have been deleted"; exit 1
          fi
          # trigger stays open
          test "$(gh api "repos/$REPO/pulls/$SUPER_PR" --jq '.state')" = "open" \
            || { echo "trigger PR #$SUPER_PR should still be open"; exit 1; }
          # DIFFERENT APP (other-app/prod) must survive — cross-app isolation
          test "$(gh api "repos/$REPO/pulls/$OTHER_PR" --jq '.state')" = "open" \
            || { echo "CROSS-APP ISOLATION FAILED: other-app PR #$OTHER_PR was closed"; exit 1; }
          gh api "repos/$REPO/git/ref/heads/$OTHER_BRANCH" >/dev/null 2>&1 \
            || { echo "CROSS-APP ISOLATION FAILED: other-app branch was deleted"; exit 1; }
          # DIFFERENT ENV (test-app/staging) must survive — cross-env isolation
          test "$(gh api "repos/$REPO/pulls/$STAGING_PR" --jq '.state')" = "open" \
            || { echo "CROSS-ENV ISOLATION FAILED: test-app/staging PR #$STAGING_PR was closed"; exit 1; }
          # MARKER-LESS human/bot PR must survive — the core safety guarantee
          test "$(gh api "repos/$REPO/pulls/$HUMAN_PR" --jq '.state')" = "open" \
            || { echo "HUMAN-PR SAFETY FAILED: marker-less PR #$HUMAN_PR was closed!"; exit 1; }
          echo "✅ isolation: closed only test-app/prod older PR; other-app/prod (#$OTHER_PR), test-app/staging (#$STAGING_PR), and marker-less human PR (#$HUMAN_PR) all survived"

      - name: "Teardown: close e2e PRs + delete branches (always)"
        if: always()
        run: |
          set -euo pipefail
          for pr in $(gh api "repos/$REPO/pulls?state=open&per_page=100" --jq '.[].number'); do
            body=$(gh api "repos/$REPO/pulls/$pr" --jq '.body // ""')
            branch=$(gh api "repos/$REPO/pulls/$pr" --jq '.head.ref')
            case "$branch" in e2e/*) is_e2e=1 ;; *) is_e2e=0 ;; esac
            if printf '%s' "$body" | grep -q 'glueops-deploy:' || [ "$is_e2e" = 1 ]; then
              gh api -X PATCH "repos/$REPO/pulls/$pr" -f state=closed >/dev/null 2>&1 || true
              gh api -X DELETE "repos/$REPO/git/refs/heads/$branch" >/dev/null 2>&1 || true
            fi
          done
          for b in "$SUPER_BRANCH" "$STAGING_BRANCH" "$HUMAN_BRANCH"; do
            gh api -X DELETE "repos/$REPO/git/refs/heads/$b" >/dev/null 2>&1 || true
          done
          echo "✅ teardown complete"
